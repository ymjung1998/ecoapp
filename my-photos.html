<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 사진 확인 및 수정</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">내 사진 확인 및 수정</h1>
        <p id="projectNameText" class="subtext">프로젝트 불러오는 중...</p>
      </div>

      <div class="topbar-actions">
        <button id="backToProjectsBtn" class="ghost-btn" type="button">프로젝트 목록</button>
        <button id="goUploadBtn" class="primary-btn" type="button">촬영 및 사진 업로드</button>
        <button id="logoutBtn" class="ghost-btn" type="button">로그아웃</button>
      </div>
    </header>

    <main>
      <div id="messageBox" class="message-box hidden"></div>

      <section class="card-section">
        <div class="section-head">
          <h2>프로젝트 지도</h2>
          <p class="subtext">노선/반경과 내가 업로드한 사진 위치를 함께 확인합니다.</p>
        </div>
        <div id="map" class="map-box"></div>
      </section>

      <section class="card-section">
        <div class="section-head">
          <h2>내 사진 목록</h2>
          <p id="photoCountText" class="subtext">0건</p>
        </div>
        <div id="photoList" class="photo-list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/map.js"></script>
  <script src="./js/my-photos.js"></script>
</body>
</html>
