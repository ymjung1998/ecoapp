<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 선택</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <h1>프로젝트 선택</h1>
        <p id="welcomeText" class="subtext">불러오는 중...</p>
      </div>

      <div class="topbar-actions">
        <button id="adminPageBtn" class="ghost-btn hidden" type="button">관리자 페이지</button>
        <button id="logoutBtn" class="ghost-btn" type="button">로그아웃</button>
      </div>
    </header>

    <main>
      <div id="messageBox" class="message-box hidden"></div>

      <section class="card-section">
        <div class="section-head">
          <h2>조사 프로젝트</h2>
          <p class="subtext">참여할 프로젝트를 선택하세요.</p>
        </div>

        <div id="projectGrid" class="project-grid"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/projects.js"></script>
</body>
</html>
